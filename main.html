<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping_mall</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="header">
    <div id="logo">
      <a href="/scr/main.html">Shopping</a>
    </div>
    <input type="text" class="search-box" placeholder="검색어를 입력하세요">
    <div class="header_btn">
      <a href="/scr/sign_in/sign_in.html"><button>로그인</button></a>
      <a href="/scr/sign_up/sign_up.html"><button>회원가입</button></a>
    </div>
  </div>

  <!-- 네비게이션 -->
  <nav>
    <span class="hamburger">☰</span>
    <a href="">추천</a>
    <a href="">신상품</a>
    <a href="">할인</a>
  </nav>

  <!-- 배너 -->
  <div class="banner">
    <div class="banner_content" id="banner_content">
      <div class="banner_item">배너 1</div>
      <div class="banner_item">배너 2</div>
      <div class="banner_item">배너 3</div>
    </div>
    <div class="banner_controls">
      <span id="banner_count">1 / 3</span>
      <button onclick="prevBanner()">
        << /button>
          <button onclick="toggleAuto()" id="auto_btn">&#9646;&#9646;</button>
          <button onclick="nextBanner()">></button>
    </div>
  </div>

  <!-- 추천 상품 -->
  <div class="section">
    <h2>추천 상품</h2>
    <div class="items">
      <div class="item">상품 1</div>
      <div class="item">상품 2</div>
      <div class="item">상품 3</div>
    </div>
  </div>

  <!-- 전체 상품 -->
  <div class="section">
    <div class="items">
      <div class="item">상품 4</div>
      <div class="item">상품 5</div>
      <div class="item">상품 6</div>
      <div class="item">상품 7</div>
      <div class="item">상품 8</div>
      <div class="item">상품 9</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
