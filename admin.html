<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Ground: Zero</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="admin.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="logo" onclick="location.href='main.html'">Ground: Zero</div>
            <nav class="admin-nav">
                <ul>
                    <li class="active"><a href="#stats"><i class="fa fa-chart-line"></i> 대시보드</a></li>
                    <li><a href="#posts"><i class="fa fa-edit"></i> 게시물 생성</a></li>
                    <li><a href="#notices"><i class="fa fa-bullhorn"></i> 공지사항 관리</a></li>
                    <li><a href="#inquiries"><i class="fa fa-question-circle"></i> 문의사항</a></li>
                    <li><a href="main.html"><i class="fa fa-home"></i> 메인으로 돌아가기</a></li>
                </ul>
            </nav>
        </aside>

        <main class="admin-content">
            <header class="admin-header">
                <h2>관리자 시스템 <small>Admin Mode</small></h2>
                <div class="admin-user-info">
                    <span><strong>관리자</strong> 님 환영합니다</span>
                    <button class="btn-logout" onclick="location.href='main.html'">로그아웃</button>
                </div>
            </header>

            <section id="stats" class="admin-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fa fa-users"></i>
                        <div class="stat-info">
                            <span class="stat-label">총 이용자 수</span>
                            <span class="stat-value">1,284명</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fa fa-file-alt"></i>
                        <div class="stat-info">
                            <span class="stat-label">새 게시물</span>
                            <span class="stat-value">42개</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fa fa-envelope-open-text"></i>
                        <div class="stat-info">
                            <span class="stat-label">미답변 문의</span>
                            <span class="stat-value">12건</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="posts" class="admin-section">
                <div class="admin-card">
                    <h3><i class="fa fa-plus-circle"></i> 신규 콘텐츠 생성</h3>
                    <form class="admin-form">
                        <div class="form-group">
                            <label>구분</label>
                            <select id="contentType">
                                <option value="product">일반 게시물(상품)</option>
                                <option value="notice">공지사항</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>제목</label>
                            <input type="text" placeholder="제목을 입력하세요" />
                        </div>
                        <div class="form-group">
                            <label>내용</label>
                            <textarea rows="5" placeholder="내용을 작성하세요"></textarea>
                        </div>
                        <button type="button" class="btn-primary" onclick="alert('생성되었습니다.')">콘텐츠 발행</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
